<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #212529, #343a40);
            min-height: 100vh;
            color: white;
        }

        .dashboard-card {
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .title {
            font-weight: bold;
            font-size: 1.2rem;
            color: black;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
            color: black;
        }

        .logout-btn {
            margin-top: 30px;
        }
        .servico {
            color: black;

        }
        .agendamentos {
            color: black;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1>👑 Painel do Admin</h1>
        <p>Controle total do sistema de agendamentos</p>
    </div>

    <div class="row g-4">

        <!-- SERVIÇOS -->
        <div class="col-md-4">
            <a href="{% url 'listar_servicos' %}" style="text-decoration:none;">
                <div class="dashboard-card bg-primary">
                    <div class ="servico">
                    <div class="icon">💈</div>
                    <div class="title">Gerenciar Serviços</div>
                    <div class="subtitle">Criar, editar e excluir serviços</div>
                </div>
                </div>
            </a>
        </div>

        <!-- RELATÓRIO HOJE -->
        <div class="col-md-4">
            <a href="{% url 'agendamentos_hoje' %}" style="text-decoration:none;">
                <div class="dashboard-card bg-success">
                    <div class="icon">📅</div>
                    <div class = "agendamentos">
                    <div class="title">Agendamentos de Hoje</div>
                    <div class="subtitle">Ver atendimentos do dia</div>
                </div>
                </div>
            </a>
        </div>

        <!-- RELATÓRIO 31 DIAS -->
        <div class="col-md-4">
            <a href="{% url 'relatorio_31_dias' %}" style="text-decoration:none;">
                <div class="dashboard-card bg-warning text-dark">
                    <div class="icon">📊</div>
                    <div class="title">Relatório 31 Dias</div>
                    <div class="subtitle">Controle financeiro</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="{% url 'proximos_agendamentos' %}" style="text-decoration:none;">
                <div class="dashboard-card" style="background: linear-gradient(135deg, #ff9800, #f57c00);">
                    <div class="icon">📆</div>
                    <div class="title">Próximos 30 dias</div>
                    <div class="subtitle">Ver agenda futura</div>
                </div>
            </a>
        </div>

    </div>

    <!-- BOTÃO SAIR -->
    <div class="text-center logout-btn">
        <a href="{% url 'logout' %}" class="btn btn-danger btn-lg rounded-4">
            Sair
        </a>
    </div>

</div>

</body>
</html>
