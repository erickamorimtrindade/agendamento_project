{% extends 'admin/base_admin.html' %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>
/* (TODO O SEU CSS ORIGINAL — NÃO ALTERADO) */
:root{
    --bg:#f8fafc;
    --card:#ffffff;
    --border:#e2e8f0;

    --text:#0f172a;
    --sub:#64748b;

    --primary:#2563eb;
    --primary-soft:#eff6ff;

    --danger:#dc2626;
    --danger-soft:#fef2f2;

    --shadow:0 12px 32px rgba(0,0,0,.06);
}

/* BASE */
body{
    background:var(--bg);
    font-family:'Inter',sans-serif;
}

/* WRAPPER */
.wrapper{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

/* CARD */
.main-card{
    background:var(--card);
    border-radius:18px;
    padding:30px;
    box-shadow:var(--shadow);
}

/* HEADER */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:1.5rem;
    font-weight:800;
}

/* BOTÃO PADRÃO (IGUAL OUTRAS PÁGINAS) */
.back-btn{
    height:42px;
    padding:0 18px;
    border-radius:12px;
    background:linear-gradient(135deg,#64748b,#475569);
    color:#fff;
    font-weight:700;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:8px;
    transition:.2s;
}

.back-btn:hover{
    transform:translateY(-2px);
}

/* DATA */
.date-area{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}

.date-input{
    padding:12px 16px;
    border-radius:10px;
    border:1px solid var(--border);
}

/* BOTÃO DIA */
.day-btn{
    display:block;
    margin:10px auto 25px;
    padding:10px 18px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#fff;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.day-btn:hover{
    background:var(--primary-soft);
    border-color:var(--primary);
}

/* GRID */
.horarios-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    gap:12px;
}

/* CARD HORÁRIO */
.horario-card{
    padding:16px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#fff;
    cursor:pointer;
    transition:.2s;
    text-align:center;
}

.horario-card:hover{
    border-color:var(--primary);
    background:var(--primary-soft);
}

/* HORA */
.horario-hora{
    font-weight:800;
}

/* STATUS */
.horario-status{
    font-size:.75rem;
    color:var(--sub);
}

/* BLOQUEADO */
.bloqueado{
    background:var(--danger-soft);
    border-color:var(--danger);
}

.bloqueado .horario-status{
    color:var(--danger);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:.2s;
}

.modal.show{
    opacity:1;
    pointer-events:all;
}

.modal-box{
    background:#fff;
    padding:24px;
    border-radius:14px;
    width:320px;
    text-align:center;
}

.modal-title{
    font-weight:700;
    margin-bottom:10px;
}

.modal-actions{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.btn{
    padding:8px 14px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-weight:700;
}

.btn-confirm{
    background:var(--primary);
    color:#fff;
}

.btn-cancel{
    background:#e2e8f0;
}
</style>
{% endblock %}

{% block content %}

<div class="wrapper">
<div class="main-card">

<div class="top">
<div class="title">Gerenciar Horários</div>

<a href="{% url 'painel_admin' %}" class="back-btn">
← Voltar
</a>
</div>

<div class="date-area">
<input type="text" id="data" name="data" value="{{ data }}" class="date-input" placeholder="dd/mm/aaaa">
</div>

<button class="day-btn" id="toggleDia">
Bloquear dia inteiro
</button>

<div class="horarios-grid">

{% for horario in horarios %}
<div class="horario-card" data-horario="{{ horario }}">
<div class="horario-hora">{{ horario }}</div>
<div class="horario-status">Disponível</div>
</div>
{% endfor %}

</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<div class="modal-title" id="modal-text"></div>

<div class="modal-actions">
<button class="btn btn-confirm" id="confirmar">Confirmar</button>
<button class="btn btn-cancel" id="cancelar">Cancelar</button>
</div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const campoData = document.getElementById("data");
    if (!campoData) return;


    const fp = flatpickr(campoData, {
        dateFormat: "d/m/Y",
        locale: "pt",
        allowInput: true,
        disableMobile: true,

        clickOpens: true
    });


    campoData.addEventListener("focus", function () {
        fp.open();
    });

    campoData.addEventListener("click", function () {
        fp.open();
    });


    campoData.addEventListener("input", function(e) {

        let v = e.target.value.replace(/\D/g, "");

        if (v.length > 8) v = v.slice(0, 8);

        if (v.length > 4) {
            v = v.replace(/(\d{2})(\d{2})(\d{1,4})/, "$1/$2/$3");
        } else if (v.length > 2) {
            v = v.replace(/(\d{2})(\d{1,2})/, "$1/$2");
        }

        e.target.value = v;

    });


    campoData.addEventListener("blur", function() {

        const valor = campoData.value.trim();

        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(valor)) return;

        const [dia, mes, ano] = valor.split("/");

        const dataObj = new Date(ano, mes - 1, dia);

        if (
            dataObj.getFullYear() !== Number(ano) ||
            dataObj.getMonth() !== Number(mes) - 1 ||
            dataObj.getDate() !== Number(dia)
        ) return;

        fp.setDate(dataObj, true);
    });

});
</script>

{% endblock %}
