
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.container-box {
    max-width: 600px;
    margin: auto;
    margin-top: 60px;
}

.card {
    border-radius: 20px;
}
</style>

<div class="container-box">

    <div class="card shadow p-4">

        <h3 class="mb-4 text-center">✏️ Editar Serviço</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Nome</label>
                <input type="text" name="nome" class="form-control" value="{{ servico.nome }}" required>
            </div>

            <div class="mb-3">
                <label>Descrição</label>
                <textarea name="descricao" class="form-control" required>{{ servico.descricao }}</textarea>
            </div>

            <div class="mb-3">
                <label>Preço</label>
                <input type="number" step="0.01" name="preco" class="form-control" value="{{ servico.preco }}" required>
            </div>

            <div class="d-flex gap-2 mt-4">

                <button type="submit" class="btn btn-primary w-100">
                    💾 Salvar Alterações
                </button>

                <a href="{% url 'listar_servicos' %}" class="btn btn-secondary w-100">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
