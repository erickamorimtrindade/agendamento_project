<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmarcar horário</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style> 
        .page-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
    }

    .main-card {
        background: #fff;
        border-radius: 30px;
        padding: 40px 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
    }

    .icon-circle {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background-color: #0d6efd;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
    }

    .page-title {
        font-size: 2.2rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 10px;
    }

    .page-subtitle {
        font-size: 1.1rem;
        color: #6b7280;
        margin-bottom: 0;
    }

    .schedule-card {
        border: 1px solid #dee2e6;
        border-radius: 22px;
        padding: 24px;
        background-color: #fff;
    }

    .schedule-info {
        font-size: 1.15rem;
        margin-bottom: 12px;
        color: #1f2937;
    }

    .schedule-label {
        font-weight: 700;
    }

    @media (max-width: 768px) {
        .main-card {
            padding: 28px 20px;
            border-radius: 24px;
        }

        .page-title {
            font-size: 1.8rem;
        }

        .page-subtitle {
            font-size: 1rem;
        }

        .schedule-info {
            font-size: 1rem;
        }

        .icon-circle {
            width: 75px;
            height: 75px;
            font-size: 1.6rem;
        }
    }
    </style>
</head>
<body>
    <div class="container-fluid">
    <div class="row justify-content-center page-wrapper">
        <div class="col-12 col-sm-11 col-md-10 col-lg-8 col-xl-6">
            <div class="main-card">

                <div class="text-center mb-4">
                    <div class="icon-circle mx-auto mb-3">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <h1 class="page-title">Confirmar Exclusão</h1>
                    <p class="page-subtitle">Tem certeza que deseja excluir este agendamento?</p>
                </div>

                <div class="schedule-card mb-4">
                    <p class="schedule-info">
                        <span class="schedule-label">Data:</span> {{ agendamento.data }}
                    </p>
                    <p class="schedule-info">
                        <span class="schedule-label">Horário:</span> {{ agendamento.horario }}
                    </p>
                    <p class="schedule-info">
                        <span class="schedule-label">Descrição:</span> {{ agendamento.descricao }}
                    </p>
                </div>

                <form method="POST" class="d-grid gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg rounded-4">
                        Sim, excluir
                    </button>
                    <a href="{% url 'listar_agendamentos' %}" class="btn btn-outline-secondary btn-lg rounded-4">
                        Cancelar
                    </a>
                </form>

            </div>
        </div>
    </div>
</div>
</body>
</html>
