<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

{% if erro %}
<p style="color:red;">{{ erro }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}
    
    <label>Usuário:</label>
    <input type="text" name="username"><br><br>

    <label>Senha:</label>
    <input type="password" name="password"><br><br>

    <button type="submit">Entrar</button>
</form>

<a href="/register/">Criar conta</a>

</body>
</html>
