

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #f8f9fa, #e9ecef);
}

.container-box {
    max-width: 1000px;
    margin: auto;
    margin-top: 40px;
}

.card-servico {
    border-radius: 15px;
    transition: 0.2s;
}

.card-servico:hover {
    transform: scale(1.02);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
</style>

<div class="container-box">

    <div class="top-bar">
        <h2>⚙️ Gerenciar Serviços</h2>

        <a href="{% url 'criar_servico' %}" class="btn btn-success">
            + Novo Serviço
        </a>
    </div>

    <div class="row">

        {% for servico in servicos %}
        <div class="col-md-4 mb-4">
            <div class="card p-3 shadow-sm card-servico">

                <h5>{{ servico.nome }}</h5>
                <p>💰 R$ {{ servico.preco }}</p>

                <a href="{% url 'editar_servico' servico.id %}" class="btn btn-primary btn-sm">
                    Editar
                </a>

            </div>
        </div>
        {% empty %}
            <p>Nenhum serviço cadastrado.</p>
        {% endfor %}

    </div>

</div>

{% endblock %}
