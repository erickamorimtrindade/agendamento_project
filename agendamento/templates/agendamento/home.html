<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home - Agendamento Online</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            font-family: Arial, sans-serif;
        }

        .home-wrapper {
            min-height: 100vh;
            padding: 20px 0;
        }

        .home-card {
            width: 100%;
            max-width: 500px;
            border: none;
            border-radius: 20px;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background-color: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 15px;
        }

        .home-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #212529;
        }

        .home-subtitle {
            font-size: 0.95rem;
            color: #6c757d;
        }

        .welcome-box {
            background-color: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-bottom: 25px;
        }

        .welcome-box h2 {
            font-size: 1.3rem;
            margin-bottom: 6px;
            color: #212529;
        }

        .welcome-box p {
            margin: 0;
            color: #6c757d;
            font-size: 0.95rem;
        }

        .menu-btn {
            height: 56px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .menu-group {
            display: grid;
            gap: 14px;
        }

        .logout-btn {
            margin-top: 8px;
        }

        @media (max-width: 576px) {
            body {
                background: #ffffff;
            }

            .home-card {
                max-width: 100%;
                border-radius: 0;
                min-height: 100vh;
            }

            .mobile-content {
                width: 100%;
                max-width: 380px;
                margin: auto;
            }

            .home-wrapper {
                padding: 0;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row justify-content-center align-items-center home-wrapper">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
            <div class="card shadow-lg home-card p-4 p-md-5">
                <div class="mobile-content">

                    <div class="text-center mb-4">
                        <div class="brand-icon">
                            <i class="bi bi-house-door"></i>
                        </div>
                        <h1 class="home-title mb-2">Agendamento Online</h1>
                        <p class="home-subtitle mb-0">
                            Gerencie seus agendamentos de forma simples
                        </p>
                    </div>

                    <div class="welcome-box">
                        <h2>Bem-vindo, {{ request.user.username }}!</h2>
                        <p>Escolha uma opção abaixo para continuar</p>
                    </div>

                    <div class="menu-group">
                        <a href="/agendar/" class="btn btn-primary menu-btn">
                            <i class="bi bi-calendar-plus"></i>
                            Criar Agendamento
                        </a>

                        <a href="/agendamento/" class="btn btn-outline-primary menu-btn">
                            <i class="bi bi-calendar-week"></i>
                            Ver Agendamentos
                        </a>

                        <a href="/logout/" class="btn btn-outline-danger menu-btn logout-btn">
                            <i class="bi bi-box-arrow-right"></i>
                            Sair
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
