
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.container-box {
    max-width: 500px;
    margin: auto;
    margin-top: 80px;
}

.card {
    border-radius: 20px;
}

.warning-icon {
    font-size: 50px;
}

</style>

<div class="container-box">

    <div class="card shadow p-4 text-center">

        <div class="warning-icon mb-3">⚠️</div>

        <h3>Excluir Serviço</h3>

        <p class="mt-3">
            Tem certeza que deseja excluir o serviço:
        </p>

        <h5 class="fw-bold">{{ servico.nome }}</h5>

        <p class="text-muted">{{ servico.descricao }}</p>

        <p class="fw-bold">💰 R$ {{ servico.preco }}</p>

        <form method="POST" class="mt-4">
            {% csrf_token %}

            <div class="d-flex gap-2">

                <button type="submit" class="btn btn-danger w-100">
                    🗑️ Confirmar Exclusão
                </button>

                <a href="{% url 'listar_servicos' %}" class="btn btn-secondary w-100">
                    Cancelar
                </a>

            </div>
        </form>

    </div>

</div>

{% endblock %}
