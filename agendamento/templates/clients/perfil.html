{% extends 'clients/base_clients.html' %}

{% block title %}Perfil{% endblock %}

{% block extra_css %}
<style>

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #6e6e6e, #eef1f4);
}

/* CONTAINER */
.perfil-page {
    padding: 40px 12px;
}

/* CARD PRINCIPAL */
.perfil-wrapper {
    max-width: 520px;
    margin: 0 auto;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    overflow: hidden;
}

/* HEADER */
.perfil-header {
    padding: 20px 25px;
    border-bottom: 1px solid #f1f3f5;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.perfil-header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* BOTÃO VOLTAR */
.btn-voltar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #6c757d;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: 0.2s;
}

.btn-voltar:hover {
    background: #5a6268;
    transform: translateY(-1px);
}

/* BODY */
.perfil-body {
    padding: 30px;
    text-align: center;
}

/* AVATAR */
.perfil-avatar {
    width: 95px;
    height: 95px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0d6efd, #0b5ed7);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 0 auto 15px;
    box-shadow: 0 8px 25px rgba(13,110,253,0.3);
}

/* NOME */
.perfil-nome {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 20px;
}

/* BLOCO INFO */
.perfil-box {
    background: #f8f9fa;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 20px;
    text-align: left;
}

/* ITEM */
.perfil-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.perfil-item:last-child {
    margin-bottom: 0;
}

.perfil-item i {
    color: #0d6efd;
    font-size: 1.1rem;
}

/* LABEL */
.perfil-item span {
    font-size: 0.9rem;
    color: #6c757d;
}

/* VALOR */
.perfil-item strong {
    display: block;
    font-size: 0.95rem;
    color: #212529;
}

/* BOTÃO SAIR */
.btn-sair {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    font-weight: 600;
    font-size: 1rem;
    transition: 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
}

.btn-sair:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(220,53,69,0.3);
}

/* MOBILE */
@media (max-width: 768px) {

    .perfil-wrapper {
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
    }

    .perfil-page {
        padding: 0;
    }

}

</style>
{% endblock %}

{% block content %}

<div class="perfil-page">
<div class="perfil-wrapper">

    <!-- HEADER -->
    <div class="perfil-header">
        <h1><i class="bi bi-person"></i>Perfil</h1>

        <a href="javascript:history.back()" class="btn-voltar">
            <i class="bi bi-arrow-left"></i>
        </a>
    </div>

    <!-- BODY -->
    <div class="perfil-body">

        <div class="perfil-avatar">
            <i class="bi bi-person"></i>
        </div>

        <div class="perfil-nome">
            {{ request.user.username }}
        </div>

        <!-- INFORMAÇÕES -->
        <div class="perfil-box">

            <div class="perfil-item">
                <i class="bi bi-telephone"></i>
                <div>
                    <span>Telefone</span>
                    <strong>{{ request.user.cliente.telefone }}</strong>
                </div>
            </div>

            <div class="perfil-item">
                <i class="bi bi-geo-alt"></i>
                <div>
                    <span>Endereço</span>
                    <strong>{{ request.user.cliente.endereco }}</strong>
                </div>
            </div>

        </div>

        <!-- BOTÃO -->
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sair">
            <i class="bi bi-box-arrow-right"></i> Sair da conta
        </a>

    </div>

</div>
</div>

{% endblock %}
